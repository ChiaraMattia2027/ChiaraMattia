<style>

body {
    margin:0;
    background:#d5db9e;
    text-align:center;
    font-family:'Libre Bodoni', serif;
    color:#333;
}

.container {
    max-width:500px;
    margin:50px auto;
    padding:30px;
}

h1 {
    font-family:'Libre Bodoni', cursive;
    font-size:70px;
    font-weight:400;
}

h2 {
    font-family:'Libre Bodoni', serif;
    font-size:30px;
}

h3 {
    font-family:'Libre Bodoni', serif;
    font-size:25px;
}
    
.box {
    background:white;
    padding:25px;
    border-radius:15px;
    box-shadow:0 5px 20px #ddd;
}

.iban {
    font-family:'Libre Bodoni', serif;
    font-size:20px;
    /*font-weight:bold;*/
    /*word-break:break-all;*/
}

.text1 {
    font-family: 'Libre Bodoni', serif;
    font-size:20px;
}    
    
.text2 {
    font-family: 'Sacramento', cursive;
    font-size:30px;
    /*font-weight:bold;*/
   /*word-break:break-all;*/
}

.text3 {
    font-family: 'Sacramento', cursive;
    font-size:50px;
    margin-top:-40px;
    /*font-weight:bold;*/
   /*word-break:break-all;*/
}

.grazie-container {
    display: flex;         /* Mantiene gli elementi sulla stessa riga */
    align-items: center;   /* Tenta l'allineamento standard */
    justify-content: center;
    gap: 10px;
    margin-top: -20px;
    /* Assicurati che non ci siano padding o margini sul contenitore che spingano in basso */
    padding: 0;
}

/* Stile per il paragrafo del testo */
.grazie-container .text3 {
    margin: 0;
    /* Opzionale: se il font ha un'altezza di riga eccessiva, riducila */
    line-height: 1;
}

/* STILE CRUCIALE PER IL CUORE: SOLLEVAMENTO MANUALE */
.grazie-container img {
    width: 60px; /* Mantieni una dimensione fissa e leggibile (es. 60px) */
    border-radius: 10px;
    /* Solleva l'immagine verso l'alto finché non è centrata a occhio */
    margin-bottom: 10px; /* Prova questo valore: più è alto, più scende. Più è basso (negativo), più sale. */
    
    /* Alternativa più diretta: margin-top negativo */
    /* margin-top: -15px; */ /* Usa questo se preferisci. Inizia da -10px e aumenta (es. -20px) finché non è centrato. */
}
    
button {
    font-family:'Libre Bodoni', serif;
    background:#9da36a;
    color:white;
    border:0;
    padding:12px 25px;
    border-radius:25px;
    font-size:16px;
    cursor:pointer;
}



</style>

</head>


<body>

<div class="container">

<h1>Chiara & Mattia</h1>

<h2>11 Settembre 2027</h2>

<p class="text1">

<button onclick="copiaIBAN()">

<!--<img src="grazie.png" alt="Seconda foto" style="width: 10%; border-radius: 15px; margin-top: 20px; display: block; margin-left: auto; margin-right: auto;">-->


<script>
function copiaIBAN() {
    let iban = document.getElementById("iban").innerText.replace(/\s+/g, ''); // Rimuove spazi vuoti
    navigator.clipboard.writeText(iban).then(() => {
        let btn = document.querySelector("button");
        btn.innerText = "Copiato!";
        setTimeout(() => { btn.innerText = "Copia IBAN"; }, 2000);
    });
}    
</script>

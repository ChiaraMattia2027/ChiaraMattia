<!DOCTYPE html>
<html lang="it">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Chiara & Mattia</title>

<link href="https://fonts.googleapis.com/css2?family=Libre+Bodoni:ital,wght@0,400..700;1,400..700&family=Sacramento&display=swap" rel="stylesheet">

<style>

body {
    margin:0;
    background:#9da36a;
    text-align:center;
    font-family:'Libre Bodoni', serif;
    color:#333;
}

.container {
    max-width:500px;
    margin:50px auto;
    padding:30px;
}

h1 {
    font-family:'Libre Bodoni', cursive;
    font-size:70px;
    font-weight:400;
}

h2 {
    font-family:'Libre Bodoni', serif;
    font-size:30px;
}

h3 {
    font-family:'Libre Bodoni', serif;
    font-size:30px;
}
    
.box {
    background:white;
    padding:25px;
    border-radius:15px;
    box-shadow:0 5px 20px #ddd;
}

.iban {
    font-family:'Libre Bodoni', serif;
    font-size:20px;
    font-weight:bold;
    word-break:break-all;
}
.text2 {
    font-family: "Sacramento", cursive;
    font-size:30px;
    /*font-weight:bold;*/
   /*word-break:break-all;*/
}

button {
    font-family:'Libre Bodoni', serif;
    background:#888c61;
    color:white;
    border:0;
    padding:12px 25px;
    border-radius:25px;
    font-size:16px;
    cursor:pointer;
}

</style>

</head>


<body>

<div class="container">

<h1>Chiara & Mattia</h1>

<h2>11 settembre 2027</h2>


<div class="box">

<p class="text2">
Per chi desiderasse contribuire alla costruzione della nostra famiglia,
riportiamo qui le coordinate bancarie:
</p>


<h3>Intestatario</h3>

<p>
Chiara XXXXX<br>

</p>


<h3>IBAN</h3>

<p id="iban" class="iban">
IT00 X000 0000 0000 0000 0000 000
</p>


<button onclick="copiaIBAN()">
Copia IBAN
</button>


<h3>Causale</h3>

<p>
Regalo matrimonio Chiara e Mattia
</p>


</div>

</div>


<script>

function copiaIBAN(){

let iban=document.getElementById("iban").innerText;

navigator.clipboard.writeText(iban);

alert("IBAN copiato!");

}

</script>


</body>

</html>
